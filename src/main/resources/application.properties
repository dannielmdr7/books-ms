spring.application.name=search
server.port=8080

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Ejecutar data.sql para poblar datos iniciales
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Conexion a PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/books
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion del cliente de Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.preferIpAddress=true
eureka.instance.hostname=search

# OpenSearch config (usar OPENSEARCH_ENABLED=true para activar)
# Bonsai: host sin https://, puerto 443, ssl=true
# Local: host=localhost, port=9200, ssl=false
opensearch.enabled=${OPENSEARCH_ENABLED:true}
opensearch.host=${OPENSEARCH_HOST:forgiving-magnolia-1mnn7pmt.us-east-1.bonsaisearch.net}
opensearch.port=${OPENSEARCH_PORT:443}
opensearch.ssl=${OPENSEARCH_SSL:true}
opensearch.credentials.user=${OPENSEARCH_USER:ac750a80d0}
opensearch.credentials.password=${OPENSEARCH_PWD:01408322cc75eb5e2298}

logging.level.tracer=TRACE